<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glow vert sur la bordure -->
    <filter id="borderGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow vert sur l'éclair -->
    <filter id="boltGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient fond sombre avec légère teinte verte -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#112018"/>
      <stop offset="100%" stop-color="#080F0C"/>
    </radialGradient>
  </defs>

  <!-- Fond principal sombre avec gradient -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>

  <!-- Bordure glow verte (layer 1 - glow diffus) -->
  <rect x="4" y="4" width="504" height="504" rx="113"
    fill="none"
    stroke="rgba(0,200,150,0.25)"
    stroke-width="12"
    filter="url(#borderGlow)"/>

  <!-- Bordure glow verte (layer 2 - plus nette) -->
  <rect x="8" y="8" width="496" height="496" rx="110"
    fill="none"
    stroke="rgba(0,200,150,0.5)"
    stroke-width="4"/>

  <!-- Éclair vert avec glow -->
  <polygon
    points="296,80 176,272 248,272 216,432 352,240 278,240"
    fill="#00C896"
    filter="url(#boltGlow)"
  />
  <!-- Éclair layer 2 (plus bright au centre) -->
  <polygon
    points="296,80 176,272 248,272 216,432 352,240 278,240"
    fill="#1FFFC0"
    opacity="0.4"
  />
</svg>
